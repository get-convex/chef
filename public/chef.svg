<svg width="160" height="50" viewBox="0 0 160 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Circular background -->
  <circle cx="25" cy="25" r="24" fill="#6B21A8"/>

  <!-- Simplified white wave shape on left -->
  <path d="M8 12 C10 15, 12 18, 10 22 C8 26, 12 30, 14 35 L8 35 Z" fill="white" opacity="0.3"/>

  <!-- White rounded shape representing the wave -->
  <path d="M15 15 L20 18 Q22 20, 20 24 L18 32 Q15 35, 12 35 L10 35 Q8 30, 10 25 Q12 20, 10 15 Z" fill="white" opacity="0.35"/>

  <!-- AI text in the circle - with black and white for contrast -->
  <text x="25" y="22" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="black" text-anchor="middle">AI</text>
  <text x="25" y="21.5" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="900" fill="white" text-anchor="middle">AI</text>

  <!-- THE STANDARD text below -->
  <text x="25" y="42" font-family="Arial, Helvetica, sans-serif" font-size="6" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">THE STANDARD</text>

  <!-- Text label to the right (optional - can be removed if you prefer just the circle) -->
  <text x="58" y="28" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" fill="#6B21A8" text-anchor="start" letter-spacing="0.5">AI STANDARD</text>
</svg>
